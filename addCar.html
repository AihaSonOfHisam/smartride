<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Car</title>
    <!-- bootstrap css -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- style css -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Responsive-->
    <link rel="stylesheet" href="css/responsive.css">
    <!-- fevicon -->
    <link rel="icon" href="images/fevicon.png" type="image/gif" />
    <!-- Scrollbar Custom CSS -->
    <link rel="stylesheet" href="css/jquery.mCustomScrollbar.min.css">
    <!-- Tweaks for older IEs-->
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css" media="screen">
    <style>
        .add-car-form {
            max-width: 600px;
            margin: 30px auto;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: bold;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #f6d601;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .car-container {
            border: 1px solid #ccc;
            padding: 15px;
            padding-top: 35px;
            margin-bottom: 20px;
            background: #2f333b ;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Optional: Add a shadow for aesthetics */
            
        }

        .add-car-button {
            margin: 20px 0;
            background-color: #f6d601;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .add-car-button:hover {
            background-color: #f6d601;
            color: #ffffff;
            transition: ease-in all 0.3s;
        }
    </style>
</head>
<body>
    <header>
        <div class="header">
            <div class="container">
                <div class="row">
                    <div class="col-xl-2 col-lg-2 col-md-2 col-sm-2 col logo_section">
                        <div class="full">
                            <div class="center-desk">
                                <div class="logo">
                                    <a href="index.html"><img src="images/smartride.png" alt="#"></a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-9 col-lg-9 col-md-9 col-sm-9" style="display: flex; align-items: center;">
                        <nav class="navigation navbar navbar-expand-md navbar-dark" style="align-items: center; margin-left: auto;">
                            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsExample04" aria-controls="navbarsExample04" aria-expanded="false" aria-label="Toggle navigation">
                            </button>
                            <div class="collapse navbar-collapse" id="navbarsExample04">
                                <ul class="navbar-nav mr-auto">
                                    <li class="nav-item">
                                        <a class="nav-link" href="index.html">Home</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#section4">Contact Us</a>
                                    </li>
                                </ul>
                                <div class="sign_btn"><a href="index.html">Sign in</a></div>
                            </div>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="car-container">
            <div class="titlepage1">
                <h2>Add New Vehicle</h2>
            </div>
        <form class="add-car-form" action="ownerCars.html">
            <div class="form-group">
                <label for="car-model" class="form-label">Car Model</label>
                <input type="text" id="car-model" name="car-model" class="form-control" placeholder="e.g., Proton Saga">
            </div>
            <div class="form-group">
                <label for="car-color" class="form-label">Color</label>
                <input type="text" id="car-color" name="car-color" class="form-control" placeholder="e.g., Ruby Red">
            </div>
            <div class="form-group">
                <label for="car-type" class="form-label">Type</label>
                <input type="text" id="car-type" name="car-type" class="form-control" placeholder="e.g., Sedan">
            </div>
            <div class="form-group">
                <label for="car-price" class="form-label">Price per Day</label>
                <input type="text" id="car-price" name="car-price" class="form-control" placeholder="e.g., RM120">
            </div>
            <div class="form-group">
                <label for="car-price" class="form-label">Price per Week</label>
                <input type="text" id="car-price" name="car-price" class="form-control" placeholder="e.g., RM750">
            </div>
            <div class="form-group">
                <label for="car-price" class="form-label">Price per Month</label>
                <input type="text" id="car-price" name="car-price" class="form-control" placeholder="e.g., RM2500">
            </div>
            <button type="submit" class="add-car-button">Add Vehicle</button>
        </form>
    </div>
    </main>
    <!-- footer -->
    <footer>
        <div class="footer">
            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="cont_call">
                            <h3> <strong class="multi color_chang"> Call Us</strong><br></h3>
                        </div>
                        <div class="cont">
                            <h3>(+60) 196046742 smartride@gmail.com</h3>
                            <h3> <strong class="multi">SmartRide</strong> UiTM Shah Alam Malaysia</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="copyright">
                <div class="container">
                    <div class="row">
                        <div class="col-md-12">
                            <p>© 2024 All Rights Reserved. Designed by <a href="index.html">SmartRide Rental</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
