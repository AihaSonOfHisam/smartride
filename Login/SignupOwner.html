<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRide - Owner Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="left-section">
      <img src="icon.png" alt="Smart Ride" class="icon">
      <h1>Smart Ride</h1>
    </div>
    <div class="right-section">
      <div class="login-box">
        <h2>Owner Sign Up</h2>
        <div class="form-scroll-container">
        <form action="#">
          <!-- Input fields -->
          <label for="owner-username">Username</label>
          <input type="text" id="owner-username" name="owner-username" placeholder="Username" required>
          
          <label for="owner-first-name">First Name</label>
          <input type="text" id="owner-first-name" name="owner-first-name" placeholder="First Name" required>
          
          <label for="owner-last-name">Last Name</label>
          <input type="text" id="owner-last-name" name="owner-last-name" placeholder="Last Name" required>
          
          <label for="owner-email">Email</label>
          <input type="email" id="owner-email" name="owner-email" placeholder="Email" required>
          
          <label for="owner-phone">Phone Number</label>
          <input type="tel" id="owner-phone" name="owner-phone" placeholder="Phone Number" required>
          
          <label for="business-name">Business Name</label>
          <input type="text" id="business-name" name="business-name" placeholder="Business Name" required>
          
          <label for="owner-address">Business Address</label>
          <input type="text" id="owner-address" name="owner-address" placeholder="Business Address" required>
          
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required>
          
          <!-- Button -->
          <button type="submit" class="btn">Sign Up as an Owner</button>
        </form>
      </div>

        <!-- Links -->
        <p class="guest-option">
          <a href="login.html">Return to Log In Page</a>
        </p>
        <p class="guest-option">
          <a href="../index.html">Return to Main Page</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
